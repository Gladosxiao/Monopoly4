name: Deploy to Kimi Website

# main 分支更新时自动部署；也支持手动触发
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 仓库名转小写，符合 GHCR 命名规范
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/monopoly4-web

jobs:
  build-and-push:
    name: 构建并推送 Docker 镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置镜像名小写
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME_LC }}:latest
            ${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 部署到 Kimi 服务器
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置镜像名小写
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: 生成生产环境 .env
        run: |
          cat > .env <<EOF
          NODE_ENV=production
          PORT=3000
          DB_PATH=/app/data/data.sqlite
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ACCESS_TTL=15m
          JWT_REFRESH_TTL_MS=604800000
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          ENABLE_TEST_MODE=false
          DEBUG=false
          USERS_CONFIG_PATH=/app/data/users.json
          EOF

      - name: 配置 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: 上传 compose 与 .env 到服务器
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_STACK_PATH: ${{ secrets.DEPLOY_STACK_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p $DEPLOY_STACK_PATH"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes docker-compose.production.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_STACK_PATH/docker-compose.yml"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes .env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_STACK_PATH/.env"

      - name: 服务器拉取镜像并启动
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_STACK_PATH: ${{ secrets.DEPLOY_STACK_PATH }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" << REMOTE
            set -e
            cd "$DEPLOY_STACK_PATH"

            # 登录 GHCR（若仓库私有则必须；公有可省略）
            if [ -n "$GHCR_PULL_TOKEN" ] && [ -n "$GHCR_USERNAME" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            export IMAGE_NAME="${{ env.IMAGE_NAME_LC }}:latest"
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps

            sleep 5
            curl -fsS http://localhost:3000/api/health || { echo "健康检查失败"; exit 1; }
          REMOTE
