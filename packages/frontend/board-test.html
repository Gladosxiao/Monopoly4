<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Board Layout Test</title>
  <style>
    body {
      margin: 0;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    canvas {
      background: #16213e;
      border-radius: 8px;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <script type="module">
    import { renderBoard, createBoardCanvas } from './src/board.js';
    import { generateMap, PLAYER4_TEMPLATE } from '@monopoly4/map-generator';

    const map = generateMap(PLAYER4_TEMPLATE);

    const players = [
      { id: 'p1', username: '阿土伯', position: 0, color: '#e74c3c', cash: 10000, deposit: 0, coupons: 0, properties: [], cards: [], items: [], isBankrupt: false },
      { id: 'p2', username: '孙小美', position: 0, color: '#3498db', cash: 10000, deposit: 0, coupons: 0, properties: [], cards: [], items: [], isBankrupt: false },
      { id: 'p3', username: '钱夫人', position: 5, color: '#f1c40f', cash: 10000, deposit: 0, coupons: 0, properties: [], cards: [], items: [], isBankrupt: false },
      { id: 'p4', username: '金贝贝', position: 10, color: '#2ecc71', cash: 10000, deposit: 0, coupons: 0, properties: [], cards: [], items: [], isBankrupt: false },
    ];

    const state = {
      roomId: 'test',
      status: 'acting',
      map,
      players,
      currentPlayerIndex: 0,
      priceIndex: 1,
      month: 1,
      day: 1,
      logs: [],
    };

    const canvas = createBoardCanvas(map.tiles.length);
    document.body.appendChild(canvas);
    renderBoard(canvas, state, 'p1');
  </script>
</body>
</html>
